name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build solution
        run: dotnet build ReelRoulette.sln --configuration Release -p:TargetFramework=net9.0 -p:EnableWindowsTargeting=true -m:1

      - name: Test solution
        run: dotnet test ReelRoulette.sln --configuration Release --no-build -p:TargetFramework=net9.0 -p:EnableWindowsTargeting=true -m:1

  build-test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Build solution
        run: dotnet build ReelRoulette.sln --configuration Release

      - name: Test solution
        run: dotnet test ReelRoulette.sln --configuration Release --no-build

  web-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/clients/web/ReelRoulette.WebUI
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/clients/web/ReelRoulette.WebUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify web client
        run: npm run verify
