name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version label"
        required: true
        default: "0.9.0"
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Normalize package version
        shell: pwsh
        run: |
          $version = "$env:PACKAGE_VERSION".Trim()
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "PACKAGE_VERSION is empty after normalization."
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Normalized PACKAGE_VERSION=$version"

      - name: Build portable package
        shell: pwsh
        run: ./tools/scripts/package-serverapp-win-portable.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build installer package
        shell: pwsh
        run: ./tools/scripts/package-serverapp-win-inno.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build desktop portable package
        shell: pwsh
        run: ./tools/scripts/package-desktop-win-portable.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build desktop installer package
        shell: pwsh
        run: ./tools/scripts/package-desktop-win-inno.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reelroulette-windows-packages
          path: artifacts/packages/**
