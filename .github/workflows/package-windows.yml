name: Package Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version label"
        required: true
        default: "0.9.0"
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PACKAGE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Normalize package version
        shell: pwsh
        run: |
          $version = "$env:PACKAGE_VERSION".Trim()
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "PACKAGE_VERSION is empty after normalization."
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Normalized PACKAGE_VERSION=$version"

      - name: Build portable package
        shell: pwsh
        run: ./tools/scripts/package-serverapp-win-portable.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build installer package
        shell: pwsh
        run: ./tools/scripts/package-serverapp-win-inno.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build desktop portable package
        shell: pwsh
        run: ./tools/scripts/package-desktop-win-portable.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Build desktop installer package
        shell: pwsh
        run: ./tools/scripts/package-desktop-win-inno.ps1 -Version "$env:PACKAGE_VERSION"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reelroulette-windows-packages
          path: artifacts/packages/**

      - name: Verify release exists for tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "GITHUB_REF_NAME is empty; cannot verify tag release."
          }
          gh release view $tag --repo "$env:GITHUB_REPOSITORY" | Out-Null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages to existing GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "GITHUB_REF_NAME is empty; cannot upload release assets."
          }
          gh release upload $tag `
            artifacts/packages/**/*.zip `
            artifacts/packages/**/*.exe `
            --clobber `
            --repo "$env:GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
