          type: string
          nullable: true

    PairResponse:
      type: object
      required:
        - paired
        - message
      properties:
        paired:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    VersionResponse:
      type: object
      required:
        - appVersion
        - apiVersion
        - minimumCompatibleApiVersion
        - supportedApiVersions
        - capabilities
      properties:
        appVersion:
          type: string
        apiVersion:
          type: string
        assetsVersion:
          type: string
          nullable: true
        minimumCompatibleApiVersion:
          type: string
        supportedApiVersions:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string

    CapabilitiesResponse:
      type: object
      required:
        - capabilities
      properties:
        capabilities:
          type: array
          items:
            type: string

    RestartResponse:
      type: object
      required:
        - accepted
        - message
      properties:
        accepted:
          type: boolean
        message:
          type: string

    ControlRuntimeSettingsSnapshot:
      type: object
      required:
        - adminAuthMode
      properties:
