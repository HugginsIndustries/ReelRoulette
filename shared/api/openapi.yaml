        - forceMediaMissing
        - forceSseDisconnect
        - lastUpdatedUtc
      properties:
        testingModeEnabled:
          type: boolean
        forceApiVersionMismatch:
          type: boolean
        forceCapabilityMismatch:
          type: boolean
        forceApiUnavailable:
          type: boolean
        forceMediaMissing:
          type: boolean
        forceSseDisconnect:
          type: boolean
        lastUpdatedUtc:
          type: string
          format: date-time

    OperatorTestingUpdateRequest:
      type: object
      properties:
        testingModeEnabled:
          type: boolean
          nullable: true
        forceApiVersionMismatch:
          type: boolean
          nullable: true
        forceCapabilityMismatch:
          type: boolean
          nullable: true
        forceApiUnavailable:
          type: boolean
          nullable: true
        forceMediaMissing:
          type: boolean
          nullable: true
        forceSseDisconnect:
          type: boolean
          nullable: true

    OperatorTestingActionResponse:
      type: object
      required:
