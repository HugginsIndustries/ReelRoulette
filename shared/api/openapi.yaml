            - TokenRequired
        adminSharedToken:
          type: string
          nullable: true

    ControlApplyResult:
      type: object
      required:
        - accepted
        - restartRequired
        - message
      properties:
        accepted:
          type: boolean
        restartRequired:
          type: boolean
        message:
          type: string
        errors:
          type: array
          items:
            type: string

    ControlSettingsApplyResponse:
      type: object
      required:
        - settings
        - result
      properties:
        settings:
          $ref: "#/components/schemas/ControlRuntimeSettingsSnapshot"
        result:
          $ref: "#/components/schemas/ControlApplyResult"

    ApiEventTelemetryEntry:
      type: object
      required:
        - timestampUtc
        - direction
        - method
        - path
      properties:
        timestampUtc:
          type: string
          format: date-time
        direction:
          type: string
        method:
          type: string
        path:
          type: string
        statusCode:
          type: integer
          format: int32
          nullable: true
        eventType:
          type: string
          nullable: true

    ConnectedClientsSnapshot:
      type: object
      required:
        - apiPairedSessions
        - controlPairedSessions
        - sseSubscribers
        - apiSessions
        - controlSessions
        - activeSseClients
      properties:
        apiPairedSessions:
          type: integer
          format: int32
        controlPairedSessions:
          type: integer
          format: int32
        sseSubscribers:
          type: integer
          format: int32
        apiSessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionInfoSnapshot"
        controlSessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionInfoSnapshot"
        activeSseClients:
          type: array
          items:
            $ref: "#/components/schemas/SseClientInfoSnapshot"

    ControlStatusResponse:
      type: object
      required:
        - serverTimeUtc
        - isHealthy
        - listenUrl
        - lanExposed
        - connectedClients
      properties:
        serverTimeUtc:
          type: string
          format: date-time
        isHealthy:
          type: boolean
        listenUrl:
          type: string
        lanExposed:
          type: boolean
        connectedClients:
          $ref: "#/components/schemas/ConnectedClientsSnapshot"
        incomingApiEvents:
          type: array
          items:
            $ref: "#/components/schemas/ApiEventTelemetryEntry"
        outgoingApiEvents:
          type: array
          items:
            $ref: "#/components/schemas/ApiEventTelemetryEntry"
        testing:
          $ref: "#/components/schemas/OperatorTestingStateSnapshot"

    SessionInfoSnapshot:
      type: object
      required:
        - sessionId
        - createdUtc
        - lastSeenUtc
        - expiresUtc
      properties:
        sessionId:
          type: string
        createdUtc:
          type: string
          format: date-time
        lastSeenUtc:
          type: string
          format: date-time
        expiresUtc:
          type: string
          format: date-time

    SseClientInfoSnapshot:
      type: object
      required:
        - connectionId
        - connectedUtc
      properties:
        connectionId:
          type: string
        clientId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        clientType:
          type: string
          nullable: true
        deviceName:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        connectedUtc:
          type: string
          format: date-time
        remoteAddress:
          type: string
          nullable: true

    ServerLogResponse:
      type: object
      required:
