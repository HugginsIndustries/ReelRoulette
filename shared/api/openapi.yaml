        presetId:
          type: string
        filterState:
          type: object
          nullable: true
          additionalProperties: true
        clientId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        includeVideos:
          type: boolean
          default: true
        includePhotos:
          type: boolean
          default: true
        randomizationMode:
          type: string
          nullable: true

    RandomResponse:
      type: object
      required:
        - id
        - displayName
        - mediaType
        - mediaUrl
        - isFavorite
        - isBlacklisted
      properties:
