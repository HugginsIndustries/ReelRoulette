openapi: 3.1.0
info:
  title: ReelRoulette API
  version: 0.3.1
  description: Contract-first API (M3 initial query/command and SSE envelope).
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/version:
    get:
      summary: Get API and app version
      operationId: getVersion
      responses:
        "200":
          description: Version response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /api/presets:
    get:
      summary: Get available presets
      operationId: getPresets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresetResponse"

  /api/random:
    post:
      summary: Request a random media item
      operationId: postRandom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RandomRequest"
      responses:
        "200":
          description: Random media result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RandomResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/favorite:
    post:
      summary: Update favorite state for an item
      operationId: postFavorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteRequest"
      responses:
        "200":
          description: Favorite updated
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/blacklist:
    post:
      summary: Update blacklist state for an item
      operationId: postBlacklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlacklistRequest"
      responses:
        "200":
          description: Blacklist updated
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/record-playback:
    post:
      summary: Record playback for an item
      operationId: postRecordPlayback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPlaybackRequest"
      responses:
        "200":
          description: Playback recorded
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library-states:
    post:
      summary: Fetch authoritative item state snapshots
      operationId: postLibraryStates
      description: |
        Re-fetch endpoint used during SSE reconnect/resync flows.
        Clients submit known item paths and receive current favorite/blacklist
        state with the latest revision observed for each item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryStatesRequest"
      responses:
        "200":
          description: State snapshots for requested paths (or all known states when no paths are provided)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryStateResponse"

  /api/events:
    get:
      summary: Stream server events
      operationId: getEventsSse
      description: |
        SSE stream with monotonic `id` values matching envelope `revision`.
        Reconnect behavior:
        - Client reconnects with `Last-Event-ID`.
        - Server replays buffered events newer than that revision when available.
        - If the revision gap exceeds replay buffer retention, server emits a
          `resyncRequired` event and client must call `/api/library-states`.
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Last acknowledged SSE revision from the previous connection.
      responses:
        "200":
          description: Event stream (SSE)
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ServerEventEnvelope"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    VersionResponse:
      type: object
      required:
        - appVersion
        - apiVersion
      properties:
        appVersion:
          type: string
        apiVersion:
          type: string
        assetsVersion:
          type: string
          nullable: true

    PresetResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        summary:
          type: string
          nullable: true

    RandomRequest:
      type: object
      required:
        - presetId
      properties:
        presetId:
          type: string
        clientId:
          type: string
          nullable: true
        includeVideos:
          type: boolean
          default: true
        includePhotos:
          type: boolean
          default: true
        randomizationMode:
          type: string
          nullable: true

    RandomResponse:
      type: object
      required:
        - id
        - displayName
        - mediaType
        - mediaUrl
        - isFavorite
        - isBlacklisted
      properties:
        id:
          type: string
        displayName:
          type: string
        mediaType:
          type: string
          enum:
            - video
            - photo
        durationSeconds:
          type: number
          format: double
          nullable: true
        mediaUrl:
          type: string
        isFavorite:
          type: boolean
        isBlacklisted:
          type: boolean

    FavoriteRequest:
      type: object
      required:
        - path
        - isFavorite
      properties:
        path:
          type: string
        isFavorite:
          type: boolean

    BlacklistRequest:
      type: object
      required:
        - path
        - isBlacklisted
      properties:
        path:
          type: string
        isBlacklisted:
          type: boolean

    RecordPlaybackRequest:
      type: object
      required:
        - path
      properties:
        clientId:
          type: string
          nullable: true
        path:
          type: string

    ServerEventEnvelope:
      type: object
      required:
        - revision
        - eventType
        - timestamp
        - payload
      properties:
        revision:
          type: integer
          format: int64
        eventType:
          type: string
        timestamp:
          type: string
          format: date-time
        payload:
          oneOf:
            - $ref: "#/components/schemas/ItemStateChangedPayload"
            - $ref: "#/components/schemas/PlaybackRecordedPayload"
            - $ref: "#/components/schemas/ResyncRequiredPayload"

    ItemStateChangedPayload:
      type: object
      required:
        - itemId
        - path
        - isFavorite
        - isBlacklisted
      properties:
        itemId:
          type: string
        path:
          type: string
        isFavorite:
          type: boolean
        isBlacklisted:
          type: boolean

    PlaybackRecordedPayload:
      type: object
      required:
        - path
      properties:
        path:
          type: string
        clientId:
          type: string
          nullable: true

    ResyncRequiredPayload:
      type: object
      required:
        - reason
        - lastEventId
        - currentRevision
      properties:
        reason:
          type: string
          example: revisionGap
        lastEventId:
          type: integer
          format: int64
        currentRevision:
          type: integer
          format: int64

    LibraryStatesRequest:
      type: object
      properties:
        paths:
          type: array
          items:
            type: string
          nullable: true

    LibraryStateResponse:
      type: object
      required:
        - itemId
        - path
        - isFavorite
        - isBlacklisted
        - revision
      properties:
        itemId:
          type: string
        path:
          type: string
        isFavorite:
          type: boolean
        isBlacklisted:
          type: boolean
        revision:
          type: integer
          format: int64
