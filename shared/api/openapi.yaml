      properties:
        accepted:
          type: boolean
        message:
          type: string
        sourceId:
          type: string
          nullable: true
        importedCount:
          type: integer
          format: int32
        updatedCount:
          type: integer
          format: int32

    LibraryProjectionResponse:
      type: object
      additionalProperties: true

    RandomRequest:
      type: object
