openapi: 3.1.0
info:
  title: ReelRoulette API
  version: 0.1.0
  description: Contract-first API skeleton for migration milestones.
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
