          type: integer
          format: int64
        currentRevision:
          type: integer
          format: int64

    LibraryStatesRequest:
      type: object
      properties:
        clientId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        paths:
          type: array
          items:
            type: string
          nullable: true

    LibraryStateResponse:
      type: object
