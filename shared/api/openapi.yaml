            - $ref: "#/components/schemas/PlaybackRecordedPayload"
            - $ref: "#/components/schemas/ResyncRequiredPayload"
            - $ref: "#/components/schemas/ItemTagsChangedPayload"
            - $ref: "#/components/schemas/TagCatalogChangedPayload"
            - $ref: "#/components/schemas/SourceStateChangedPayload"
            - $ref: "#/components/schemas/RefreshStatusChangedPayload"

    ItemStateChangedPayload:
      type: object
      required:
        - itemId
        - path
        - isFavorite
        - isBlacklisted
      properties:
