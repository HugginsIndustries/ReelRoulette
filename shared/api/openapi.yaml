openapi: 3.1.0
info:
  title: ReelRoulette API
  version: 0.11.0-dev
  description: Contract-first API with M6b refresh pipeline, status/settings APIs, and thumbnail artifact retrieval endpoints.
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/pair:
    get:
      summary: Pair client and issue auth cookie
      operationId: getPair
      description: |
        Pairing endpoint for auth-required mode.
        Accepts token via query (`?token=...`) and issues the pairing cookie when valid.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pairing succeeded or auth disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Pair client and issue auth cookie
      operationId: postPair
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
      responses:
        "200":
          description: Pairing succeeded or auth disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/version:
    get:
      summary: Get API and app version
      operationId: getVersion
      responses:
        "200":
          description: Version response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "401":
          description: Unauthorized when auth is required and localhost trust is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/capabilities:
    get:
      summary: Get server capability list
      operationId: getCapabilities
      responses:
        "200":
          description: Capability response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401":
          description: Unauthorized when auth is required and localhost trust is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/restart:
    post:
      summary: Request graceful runtime restart (local-first, LAN opt-in)
      operationId: postControlRestart
      responses:
        "200":
          description: Restart accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestartResponse"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Restart already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestartResponse"

  /control/stop:
    post:
      summary: Request graceful runtime stop
      operationId: postControlStop
      responses:
        "200":
          description: Stop accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestartResponse"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Lifecycle operation already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestartResponse"

  /control/status:
    get:
      summary: Get control-plane runtime status and telemetry
      operationId: getControlStatus
      responses:
        "200":
          description: Control status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlStatusResponse"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/settings:
    get:
      summary: Get control-plane settings
      operationId: getControlSettings
      responses:
        "200":
          description: Control settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlRuntimeSettingsSnapshot"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Apply control-plane settings
      operationId: postControlSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ControlRuntimeSettingsSnapshot"
      responses:
        "200":
          description: Settings apply result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlSettingsApplyResponse"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/logs/server:
    get:
      summary: Read server last.log lines
      operationId: getControlServerLogs
      parameters:
        - name: tail
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 5000
          description: Number of trailing lines to return.
        - name: contains
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Optional case-insensitive contains filter.
        - name: level
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Optional level hint filter (for example info/warn/error).
      responses:
        "200":
          description: Log snapshot response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerLogResponse"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/testing:
    get:
      summary: Get current operator testing mode and fault flags
      operationId: getControlTestingState
      responses:
        "200":
          description: Operator testing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorTestingStateSnapshot"
        "401":
          description: Unauthorized when control admin auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/testing/update:
    post:
      summary: Update testing mode and operator fault simulation flags
      operationId: postControlTestingUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorTestingUpdateRequest"
      responses:
        "200":
          description: Testing state update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorTestingActionResponse"
        "401":
          description: Unauthorized for testing actions while control admin auth is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Testing mode is required before enabling fault simulation flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/testing/reset:
    post:
      summary: Reset all testing scenario flags while preserving testing mode state
      operationId: postControlTestingReset
      responses:
        "200":
          description: Testing reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorTestingActionResponse"
        "401":
          description: Unauthorized for testing actions while control admin auth is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden when request is non-local and LAN control access is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /control/pair:
    get:
      summary: Pair control-plane session and issue admin cookie
      operationId: getControlPair
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Control pairing succeeded or admin auth disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Control LAN access disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Pair control-plane session and issue admin cookie
      operationId: postControlPair
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
      responses:
        "200":
          description: Control pairing succeeded or admin auth disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Control LAN access disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/presets:
    get:
      summary: Get available presets
      operationId: getPresets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresetResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No playable media available for current request or testing scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Replace preset catalog
      operationId: postPresets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/FilterPresetSnapshot"
      responses:
        "200":
          description: Preset catalog updated
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources:
    get:
      summary: Get library sources with global enabled states
      operationId: getSources
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sources/import:
    post:
      summary: Import a media source folder into library.json
      operationId: postSourceImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceImportRequest"
      responses:
        "200":
          description: Source import completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceImportResponse"
        "400":
          description: Invalid import request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library/projection:
    get:
      summary: Get current library projection snapshot
      operationId: getLibraryProjection
      responses:
        "200":
          description: Library projection JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryProjectionResponse"

  /api/sources/{sourceId}/enabled:
    post:
      summary: Update global enabled state for a source
      operationId: postSourceEnabled
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSourceEnabledRequest"
      responses:
        "200":
          description: Source state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
        "404":
          description: Source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/presets/match:
    post:
      summary: Match filter state to preset
      operationId: postPresetMatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetMatchRequest"
      responses:
        "200":
          description: Preset match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresetMatchResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/random:
    post:
      summary: Request a random media item
      operationId: postRandom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RandomRequest"
      responses:
        "200":
          description: Random media result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RandomResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/media/{idOrToken}:
    get:
      summary: Stream media by stable item id or issued playback token
      operationId: getMediaByIdOrToken
      parameters:
        - name: idOrToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Media stream response with range support
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Media not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/favorite:
    post:
      summary: Update favorite state for an item
      operationId: postFavorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteRequest"
      responses:
        "200":
          description: Favorite updated
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/blacklist:
    post:
      summary: Update blacklist state for an item
      operationId: postBlacklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlacklistRequest"
      responses:
        "200":
          description: Blacklist updated
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/record-playback:
    post:
      summary: Record playback for an item
      operationId: postRecordPlayback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPlaybackRequest"
      responses:
        "200":
          description: Playback recorded
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/playback/clear-stats:
    post:
      summary: Clear playback stats
      operationId: postClearPlaybackStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearPlaybackStatsRequest"
      responses:
        "200":
          description: Playback stats cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearPlaybackStatsResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/library-states:
    post:
      summary: Fetch authoritative item state snapshots
      operationId: postLibraryStates
      description: |
        Re-fetch endpoint used during SSE reconnect/resync flows.
        Clients submit known item paths and receive current favorite/blacklist
        state with the latest revision observed for each item.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryStatesRequest"
      responses:
        "200":
          description: State snapshots for requested paths (or all known states when no paths are provided)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryStateResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/model:
    post:
      summary: Get tag editor model snapshot
      operationId: postTagEditorModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagEditorModelRequest"
      responses:
        "200":
          description: Tag editor model snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagEditorModelResponse"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/apply-item-tags:
    post:
      summary: Apply batch add/remove tag deltas to items
      operationId: postTagEditorApplyItemTags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyItemTagsRequest"
      responses:
        "200":
          description: Tag delta applied
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/upsert-category:
    post:
      summary: Create or update category metadata
      operationId: postTagEditorUpsertCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCategoryRequest"
      responses:
        "200":
          description: Category upserted
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/upsert-tag:
    post:
      summary: Create or update tag metadata
      operationId: postTagEditorUpsertTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTagRequest"
      responses:
        "200":
          description: Tag upserted
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/rename-tag:
    post:
      summary: Rename tag and optionally move category
      operationId: postTagEditorRenameTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameTagRequest"
      responses:
        "200":
          description: Tag renamed
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/delete-tag:
    post:
      summary: Delete a tag
      operationId: postTagEditorDeleteTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteTagRequest"
      responses:
        "200":
          description: Tag deleted
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/delete-category:
    post:
      summary: Delete a category and optionally reassign tags
      operationId: postTagEditorDeleteCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteCategoryRequest"
      responses:
        "200":
          description: Category deleted
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/sync-catalog:
    post:
      summary: Replace server tag catalog snapshot from client source-of-truth
      operationId: postTagEditorSyncCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncTagCatalogRequest"
      responses:
        "200":
          description: Catalog synchronized
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tag-editor/sync-item-tags:
    post:
      summary: Hydrate item-tag snapshots for requested items
      operationId: postTagEditorSyncItemTags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncItemTagsRequest"
      responses:
        "200":
          description: Item tags synchronized
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/refresh/start:
    post:
      summary: Start unified refresh run
      operationId: postRefreshStart
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshStartRequest"
      responses:
        "200":
          description: Refresh run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshStartResponse"
        "409":
          description: Refresh already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/refresh/status:
    get:
      summary: Get refresh status snapshot
      operationId: getRefreshStatus
      responses:
        "200":
          description: Current refresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshStatusSnapshot"

  /api/refresh/settings:
    get:
      summary: Get core-owned refresh settings
      operationId: getRefreshSettings
      responses:
        "200":
          description: Refresh settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSettingsSnapshot"
    post:
      summary: Update core-owned refresh settings
      operationId: postRefreshSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSettingsSnapshot"
      responses:
        "200":
          description: Updated refresh settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSettingsSnapshot"

  /api/duplicates/scan:
    post:
      summary: Scan for fingerprint-based duplicate groups
      operationId: postDuplicateScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateScanRequest"
      responses:
        "200":
          description: Duplicate scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateScanResponse"
        "400":
          description: Invalid duplicate scan request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/duplicates/apply:
    post:
      summary: Apply duplicate keep/delete selections
      operationId: postDuplicateApply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateApplyRequest"
      responses:
        "200":
          description: Duplicate apply results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateApplyResponse"
        "400":
          description: Invalid duplicate apply request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/autotag/scan:
    post:
      summary: Scan for auto-tag suggestions
      operationId: postAutoTagScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoTagScanRequest"
      responses:
        "200":
          description: Auto-tag scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTagScanResponse"
        "400":
          description: Invalid auto-tag scan request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/autotag/apply:
    post:
      summary: Apply auto-tag assignments
      operationId: postAutoTagApply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoTagApplyRequest"
      responses:
        "200":
          description: Auto-tag apply results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTagApplyResponse"
        "400":
          description: Invalid auto-tag apply request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/logs/client:
    post:
      summary: Ingest client-originated log events to centralized server log
      operationId: postClientLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientLogRequest"
      responses:
        "200":
          description: Log accepted
          content:
            application/json:
              schema:
                type: object
                required: [accepted]
                properties:
                  accepted:
                    type: boolean
  /api/thumbnail/{itemId}:
    get:
      summary: Get generated thumbnail by item id
      operationId: getThumbnailByItemId
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thumbnail image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Thumbnail not found

  /api/events:
    get:
      summary: Stream server events
      operationId: getEventsSse
      description: |
        SSE stream with monotonic `id` values matching envelope `revision`.
        Reconnect behavior:
        - Client reconnects with `Last-Event-ID`.
        - Server replays buffered events newer than that revision when available.
        - If the revision gap exceeds replay buffer retention, server emits a
          `resyncRequired` event and client must call `/api/library-states`.
        Identity/session continuity:
        - Clients should provide a stable `clientId` per installation/device.
        - Clients may provide an optional `sessionId` per runtime session to
          correlate reconnect attempts and playback-originated events.
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
          description: Last acknowledged SSE revision from the previous connection.
        - name: lastEventId
          in: query
          required: false
          schema:
            type: string
          description: Query-string reconnect revision fallback for browser EventSource clients.
        - name: clientId
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Stable client identity for cross-request correlation.
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Optional runtime session identity for reconnect/playback correlation.
        - name: clientType
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Optional client type hint (for example desktop/web/mobile-web/operator).
        - name: deviceName
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Optional friendly device/client label shown in operator diagnostics.
      responses:
        "200":
          description: Event stream (SSE)
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ServerEventEnvelope"
        "401":
          description: Unauthorized when auth is required and request is not paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    PairRequest:
      type: object
