        - itemId
        - path
        - isFavorite
        - isBlacklisted
        - revision
      properties:
        itemId:
          type: string
        path:
          type: string
        isFavorite:
          type: boolean
        isBlacklisted:
          type: boolean
        revision:
          type: integer
          format: int64

